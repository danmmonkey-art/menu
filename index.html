<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damn Monkey - Menú Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        #map { height: 300px; border-radius: 12px; margin-bottom: 1rem; z-index: 10; }
        .producto-card { border-bottom: 1px solid #eee; transition: all 0.2s; }
        .opcion-entrega { transition: all 0.2s; border: 2px solid transparent; }
        .opcion-entrega.active { border-color: #ea580c; background-color: #fff7ed; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-32">

    <header class="bg-orange-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-black tracking-tighter italic">DAMN MONKEY 🐵🔥</h1>
        <p class="text-sm opacity-90 mt-1">¡Sabor criminal en cada mordida!</p>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6">
            <h2 class="text-lg font-bold mb-3">🛵 ¿Cómo prefieres tu pedido?</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="setMetodo('domicilio')" id="btn-domicilio" class="opcion-entrega active bg-gray-50 p-3 rounded-xl text-center">
                    <span class="block text-2xl">🛵</span>
                    <span class="text-xs font-bold">A domicilio</span>
                </button>
                <button onclick="setMetodo('retiro')" id="btn-retiro" class="opcion-entrega bg-gray-50 p-3 rounded-xl text-center">
                    <span class="block text-2xl">🥡</span>
                    <span class="text-xs font-bold">Retiro en local</span>
                </button>
            </div>

            <div id="seccion-mapa">
                <div id="map"></div>
                <button onclick="obtenerUbicacion()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md flex justify-center items-center gap-2 mb-2">
                    🎯 Mi ubicación actual
                </button>
                <p id="envio-status" class="text-center font-semibold text-orange-600 text-sm"></p>
            </div>
            
            <div id="seccion-retiro" class="hidden p-4 bg-orange-50 rounded-xl text-center border border-orange-200">
                <p class="text-orange-800 font-bold">📍 Punto de retiro:</p>
                <p class="text-sm">Conocoto (Ubicación enviada por WhatsApp al confirmar)</p>
            </div>
        </div>

        <div id="menu-container" class="space-y-4">
            </div>
    </main>

    <div id="carrito-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-2xl hidden max-w-md mx-auto z-50">
        <div class="flex justify-between items-center mb-4">
            <div>
                <span id="label-envio" class="block text-[10px] text-orange-500 font-bold uppercase">Envío: $0.00</span>
                <span id="total-precio" class="text-2xl font-black text-orange-600">$0.00</span>
            </div>
            <button onclick="enviarWhatsApp()" class="bg-green-500 text-white px-6 py-3 rounded-2xl font-black shadow-lg">
                PEDIR AHORA ✅
            </button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN BÁSICA
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjnoFxILR8LIx_ELGazuvaVKKnSP5NBltgAK6qF_ig6Lww4vdXJ-dhBPOKj5nWdqDwGyWA3ubNahfQ/pub?output=csv';
        const MI_UBICACION = [-0.2660338701466934, -78.50071673109036];
        const WHATSAPP_NUMBER = '593963238612'; // Cambié este por el formato correcto de Ecuador

        const ZONAS = { "type": "FeatureCollection", "features": [
            {"type":"Feature","properties":{"Precio":"0.60"},"geometry":{"coordinates":[[[-78.49530625369117,-0.25809490229866583],[-78.49735016241362,-0.2575345633263453],[-78.49979242785784,-0.2603326243310988],[-78.50171768074698,-0.2641358448047697],[-78.50300511979523,-0.26521066777172564],[-78.50305730510928,-0.27383395636697117],[-78.49936399047176,-0.2748358272354636],[-78.49661481032281,-0.26749586535748904],[-78.49530625369117,-0.25809490229866583]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"0.80"},"geometry":{"coordinates":[[[-78.49845497439557,-0.27266496686392827],[-78.49924727126887,-0.2749849824318318],[-78.50306161414979,-0.2739342509763958],[-78.50334948908387,-0.2766114569682827],[-78.50084497715453,-0.2803249997614614],[-78.49674429676153,-0.2766694616732366],[-78.49575936115423,-0.2742719487607559],[-78.49845497439557,-0.27266496686392827]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"0.82"},"geometry":{"coordinates":[[[-78.49645095548433,-0.2564123337681252],[-78.49714333720112,-0.257529365036433],[-78.49519543663794,-0.2580832648026501],[-78.49580473583192,-0.262126730521004],[-78.49450305820402,-0.2633176145538272],[-78.49303520896481,-0.26166514753147396],[-78.49453998522876,-0.25886795425554965],[-78.49341371653749,-0.25722471662392365],[-78.49506620090159,-0.25640309857347177],[-78.49645095548433,-0.2564123337681252]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"0.90"},"geometry":{"coordinates":[[[-78.48532530323855,-0.2586682099030213],[-78.48408630375522,-0.2545955790959624],[-78.49014469256566,-0.25795992610721896],[-78.49319286970317,-0.2571378119487946],[-78.49435600168596,-0.25889587169081096],[-78.48532530323855,-0.2586682099030213]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"2.00"},"geometry":{"coordinates":[[[-78.48385863883664,-0.25395053732252393],[-78.48278355561399,-0.25149684183645604],[-78.48336536535801,-0.249384639682674],[-78.48648943072268,-0.2486763562502432],[-78.4879439550832,-0.2522936605242734],[-78.48385863883664,-0.25395053732252393]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"1.40"},"geometry":{"coordinates":[[[-78.49489975729196,-0.25640153649284514],[-78.4901344086103,-0.2578224625208776],[-78.48412140500079,-0.2545820578142468],[-78.48386147689084,-0.2540448783442031],[-78.48805498373089,-0.25226005607869695],[-78.48691130004707,-0.24934888913917064],[-78.49020372277266,-0.2489156797174985],[-78.4943972296127,-0.25038859169188754],[-78.49489975729196,-0.25640153649284514]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"1.36"},"geometry":{"coordinates":[[[-78.49496566235722,-0.25627454670009797],[-78.49449538988071,-0.2503107806862488],[-78.49156691315001,-0.24892137060601272],[-78.4966329641366,-0.24524477707224435],[-78.49889879898812,-0.25272620844054927],[-78.49661159453423,-0.256360048814372],[-78.49496566235722,-0.25627454670009797]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"1.92"},"geometry":{"coordinates":[[[-78.5002023098226,-0.24794565416031844],[-78.49772600087826,-0.2486791932668524],[-78.49665808697863,-0.2451327003185213],[-78.49255783237986,-0.24803317510303202],[-78.4899239018489,-0.24398423291579263],[-78.49090534785516,-0.24173584953604177],[-78.49384967749008,-0.24005846869114578],[-78.49898888566916,-0.24132541508309657],[-78.5002023098226,-0.24794565416031844]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"2.00"},"geometry":{"coordinates":[[[-78.49248031687583,-0.24808967500365497],[-78.49149151090066,-0.24886753237996118],[-78.49023902155356,-0.248801612509979],[-78.48685070826772,-0.24923668364749574],[-78.48652110580814,-0.2485774849487541],[-78.48335692219479,-0.2493157874896923],[-78.48517632777272,-0.24559790641998802],[-78.48563777832584,-0.2422623739465024],[-78.4850972302921,-0.23915095418533383],[-78.48954027144877,-0.23762161200920673],[-78.49370644249004,-0.24000789908589582],[-78.49088504543505,-0.24157679293914214],[-78.48985668129664,-0.24398945820998108],[-78.49248031687583,-0.24808967500365497]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"1.84"},"geometry":{"coordinates":[[[-78.49424005027828,-0.2590524264152094],[-78.49286235265338,-0.2617182565921752],[-78.49438868011316,-0.26350163099688473],[-78.49578647473477,-0.262393046937774],[-78.49634880590392,-0.26658638612131824],[-78.49433687992802,-0.268514357682065],[-78.4900667634107,-0.27084398957805433],[-78.4877692389181,-0.26975147260672827],[-78.48682130527224,-0.2678395698971059],[-78.48746396946578,-0.26433708781313214],[-78.48400964942479,-0.26575093391200255],[-78.4798965985849,-0.2663293254507977],[-78.48138305168031,-0.26136299139463404],[-78.48453924898408,-0.26284600834479477],[-78.49104828500286,-0.25911846226276225],[-78.49424005027828,-0.2590524264152094]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"1.97"},"geometry":{"coordinates":[[[-78.49057141246017,-0.2848945432822063],[-78.48875588741178,-0.2823314804969357],[-78.4921733463266,-0.2795761873736211],[-78.49672283850703,-0.2767354581266517],[-78.5007597118503,-0.2803664653121558],[-78.50347232733976,-0.28820516203713],[-78.49057141246017,-0.2848945432822063]]],"type":"Polygon"}},
            {"type":"Feature","properties":{"Precio":"1.91"},"geometry":{"coordinates":[[[-78.49831169690387,-0.2725948732566792],[-78.4955364102971,-0.2741848631078767],[-78.49649041506791,-0.27664211973505815],[-78.48865601225064,-0.2822504447129859],[-78.48987020014116,-0.2768155731250346],[-78.48963892625729,-0.2710916099311902],[-78.49362840075455,-0.26935707509309736],[-78.49625914118404,-0.26701545267019355],[-78.49831169690387,-0.2725948732566792]]],"type":"Polygon"}}
        ]};

        let carrito = [];
        let metodo = 'domicilio';
        let envioCosto = 0;
        let map, userMarker, shopMarker;

        function initMap() {
            map = L.map('map').setView(MI_UBICACION, 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            L.geoJSON(ZONAS, {
                style: { color: "#ea580c", weight: 2, fillOpacity: 0.2 }
            }).addTo(map);

            shopMarker = L.marker(MI_UBICACION).addTo(map).bindPopup("<b>Damn Monkey</b>").openPopup();

            map.on('click', function(e) {
                if (metodo === 'domicilio') ubicarManual(e.latlng);
            });
        }

        function ubicarManual(latlng) {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(latlng, {draggable: true}).addTo(map);
            calcularEnvio(latlng.lat, latlng.lng);
        }

        function obtenerUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const latlng = {lat: pos.coords.latitude, lng: pos.coords.longitude};
                    map.setView(latlng, 16);
                    ubicarManual(latlng);
                }, () => alert("Por favor activa tu GPS"));
            }
        }

        function calcularEnvio(lat, lng) {
            const punto = turf.point([lng, lat]);
            let encontrado = false;
            envioCosto = 0;

            ZONAS.features.forEach(zona => {
                if (turf.booleanPointInPolygon(punto, zona)) {
                    envioCosto = parseFloat(zona.properties.Precio);
                    encontrado = true;
                }
            });

            const status = document.getElementById('envio-status');
            if (encontrado) {
                status.innerText = `✅ ¡Llegamos! Envío: $${envioCosto.toFixed(2)}`;
                status.className = "text-center font-bold text-green-600 text-sm";
            } else {
                status.innerText = "❌ Estás fuera de zona de entrega";
                status.className = "text-center font-bold text-red-600 text-sm";
            }
            actualizarBarraCarrito();
        }

        function setMetodo(tipo) {
            metodo = tipo;
            document.getElementById('btn-domicilio').classList.toggle('active', tipo === 'domicilio');
            document.getElementById('btn-retiro').classList.toggle('active', tipo === 'retiro');
            document.getElementById('seccion-mapa').classList.toggle('hidden', tipo === 'retiro');
            document.getElementById('seccion-retiro').classList.toggle('hidden', tipo === 'domicilio');
            if(tipo === 'retiro') envioCosto = 0;
            actualizarBarraCarrito();
        }

        async function cargarMenu() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const filas = data.split('\n').slice(1);
                const container = document.getElementById('menu-container');
                container.innerHTML = "";
                
                filas.forEach(fila => {
                    const columnas = fila.split(',');
                    if(columnas.length >= 3) {
                        const [plato, desc, precio, original] = columnas;
                        container.innerHTML += `
                            <div class="bg-white p-4 rounded-2xl shadow-sm border-b producto-card">
                                <h3 class="font-black text-lg">${plato}</h3>
                                <p class="text-gray-500 text-xs mb-2">${desc}</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-orange-600 font-bold">$${parseFloat(precio).toFixed(2)} 
                                        <span class="text-gray-400 line-through text-[10px] ml-1">$${parseFloat(original).toFixed(2)}</span>
                                    </span>
                                    <button onclick="agregar('${plato}', ${precio})" class="bg-orange-100 text-orange-600 px-4 py-1 rounded-lg font-bold hover:bg-orange-600 hover:text-white transition">+ Agregar</button>
                                </div>
                            </div>`;
                    }
                });
            } catch (e) {
                console.error("Error cargando el menú");
            }
        }

        function agregar(nombre, precio) {
            carrito.push({nombre, precio: parseFloat(precio)});
            actualizarBarraCarrito();
        }

        function actualizarBarraCarrito() {
            const subtotal = carrito.reduce((sum, p) => sum + p.precio, 0);
            const total = subtotal + envioCosto;
            
            document.getElementById('label-envio').innerText = `Envío: $${envioCosto.toFixed(2)}`;
            document.getElementById('total-precio').innerText = `$${total.toFixed(2)}`;
            
            if(carrito.length > 0) {
                document.getElementById('carrito-bar').classList.remove('hidden');
            }
        }

        function enviarWhatsApp() {
            if(metodo === 'domicilio' && envioCosto === 0) {
                alert("Por favor selecciona un punto dentro de la zona de entrega en el mapa.");
                return;
            }
            let mensaje = `*PEDIDO DAMN MONKEY 🐵🔥*\n\n`;
            mensaje += `*Modo:* ${metodo === 'domicilio' ? '🛵 A domicilio' : '🥡 Retiro en local'}\n\n`;
            carrito.forEach(p => mensaje += `• ${p.nombre} ($${p.precio.toFixed(2)})\n`);
            mensaje += `\n*Envío:* $${envioCosto.toFixed(2)}`;
            mensaje += `\n*TOTAL:* $${(carrito.reduce((s,p)=>s+p.precio,0) + envioCosto).toFixed(2)}`;
            
            if(metodo === 'domicilio') {
                const pos = userMarker.getLatLng();
                mensaje += `\n\n📍 *Ubicación:* https://www.google.com/maps?q=${pos.lat},${pos.lng}`;
            }
            
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        window.onload = () => { initMap(); cargarMenu(); };
    </script>
</body>
</html>
