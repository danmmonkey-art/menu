<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Damn Monkey - Menu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        #map { height: 280px; border-radius: 16px; margin-bottom: 1rem; z-index: 1; width: 100%; border: 2px solid #fed7aa; }
        .producto-card { transition: all 0.2s; border-bottom: 1px solid #f0f0f0; }
        .opcion-entrega { transition: all 0.2s; border: 2px solid transparent; cursor: pointer; }
        .opcion-entrega.active { border-color: #ea580c; background-color: #fff7ed; }

        /* CAMBIO 2: controles en columna vertical para no tapar el precio */
        .controles-producto {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .btn-control {
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-weight: bold;
        }
        .cantidad-badge {
            font-weight: 900;
            font-size: 13px;
            color: #ea580c;
            min-width: 20px;
            text-align: center;
            line-height: 1;
        }

        .carrito-badge { position: absolute; top: -8px; right: -8px; background-color: #ea580c; color: white; border-radius: 9999px; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
        .imagen-contenedor { width: 70px; height: 70px; flex-shrink: 0; }
        .imagen-plato { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; background: #fed7aa; border: 1px solid #ffedd5; }
        .imagen-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #fed7aa, #ffedd5); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .btn-disabled { background: #d1d5db !important; cursor: not-allowed !important; opacity: 0.7; }

        /* Panel carrito */
        #panel-carrito { transform: translateY(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1); }
        #panel-carrito.abierto { transform: translateY(0); }
        .carrito-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; }
        .carrito-overlay.visible { display: block; }

        /* Pago */
        .pago-btn { transition: all 0.2s; border: 2px solid #e5e7eb; border-radius: 12px; padding: 10px 18px; font-weight: 700; font-size: 13px; cursor: pointer; background: white; color: #374151; }
        .pago-btn.selected { border-color: #ea580c; background: #fff7ed; color: #ea580c; }

        /* Badge descuento */
        .badge-descuento { background: #dc2626; color: white; font-size: 9px; font-weight: 900; padding: 1px 5px; border-radius: 6px; letter-spacing: 0.02em; }
        .precio-original { text-decoration: line-through; color: #9ca3af; font-size: 10px; }
        .precio-final { color: #ea580c; font-weight: 900; font-size: 14px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-32">

    <header class="bg-gradient-to-r from-orange-600 to-orange-700 text-white p-5 text-center shadow-lg sticky top-0 z-20">
        <h1 class="text-3xl font-black tracking-tighter italic">DANM MONKEY ORIGINAL</h1>
        <p class="text-sm opacity-95 mt-1">¡Sabor criminal en cada mordida!</p>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- Metodo de entrega -->
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-4">
            <h2 class="text-lg font-bold mb-3">Como prefieres tu pedido?</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="setMetodo('domicilio')" id="btn-domicilio" class="opcion-entrega active bg-gray-50 p-3 rounded-xl text-center">
                    <span class="block text-2xl">&#128757;</span>
                    <span class="text-xs font-bold">A domicilio</span>
                </button>
                <button onclick="setMetodo('retiro')" id="btn-retiro" class="opcion-entrega bg-gray-50 p-3 rounded-xl text-center">
                    <span class="block text-2xl">&#127978;</span>
                    <span class="text-xs font-bold">Retiro en local</span>
                </button>
            </div>

            <div id="seccion-mapa">
                <div id="map"></div>
                <button onclick="obtenerUbicacion()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md flex justify-center items-center gap-2 mb-2 hover:bg-blue-700 active:scale-95 transition">
                    Mi ubicacion actual
                </button>
                <div id="envio-status" class="text-center font-semibold text-sm p-2 rounded-lg">Selecciona tu ubicacion en el mapa</div>
            </div>

            <div id="seccion-retiro" class="hidden p-4 bg-orange-50 rounded-xl text-center border border-orange-200">
                <p class="text-orange-800 font-bold mb-1">Punto de retiro:</p>
                <p class="text-sm text-gray-900 font-bold uppercase">Lizardo Garcia y Alejandro Galarza</p>
                <p class="text-xs text-orange-700 font-semibold italic">Conjunto Albazul 2</p>
            </div>
        </div>

        <!-- Menu -->
        <div id="contenedor-menu"></div>
    </main>

    <!-- Overlay carrito -->
    <div class="carrito-overlay" id="carrito-overlay" onclick="cerrarCarrito()"></div>

    <!-- Panel carrito deslizable -->
    <div id="panel-carrito" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl shadow-2xl z-50 border-t-4 border-orange-500" style="max-height:85vh; overflow-y:auto;">
        <div class="flex items-center justify-between px-5 pt-4 pb-2 sticky top-0 bg-white border-b border-gray-100 rounded-t-3xl z-10">
            <h2 class="font-black text-lg text-gray-800">Tu pedido</h2>
            <button onclick="cerrarCarrito()" class="text-gray-400 font-bold text-xl px-2">&#10005;</button>
        </div>

        <div id="lista-carrito" class="px-4 py-3 space-y-3"></div>

        <!-- CAMBIO 1: Metodo de pago DENTRO del carrito -->
        <div class="px-4 pb-2" id="seccion-pago-carrito">
            <h3 class="text-sm font-black text-gray-700 mb-2 uppercase tracking-wide">Metodo de pago</h3>
            <div id="opciones-pago-carrito" class="flex gap-3 flex-wrap"></div>
        </div>

        <div id="resumen-carrito" class="px-4 pb-2"></div>

        <div class="px-4 pb-6">
            <!-- CAMBIO: Boton "PEDIR AHORA" reemplaza al de confirmar por whatsapp -->
            <button id="btn-whatsapp" onclick="enviarWhatsApp()"
                class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-4 rounded-2xl font-black text-base shadow-lg active:scale-95 transition">
                PEDIR AHORA
            </button>
        </div>
    </div>

    <!-- Barra inferior: solo "Ver carrito" -->
    <div id="carrito-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-orange-500 p-4 shadow-2xl hidden max-w-md mx-auto z-30">
        <div class="flex justify-between items-center">
            <div class="relative cursor-pointer" onclick="abrirCarrito()">
                <span id="label-envio" class="block text-[10px] text-orange-500 font-bold uppercase tracking-wider">Envio: --</span>
                <span id="total-precio" class="text-2xl font-black text-orange-600">$0.00</span>
                <div id="carrito-count" class="carrito-badge">0</div>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirCarrito()" class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition">
                    Ver carrito
                </button>
            </div>
        </div>
    </div>

    <script>
        const LOCAL_COORDS = [-0.2660338701466934, -78.50071673109036];
        const WHATSAPP_NUMBER = '593983730006';

        const PRODUCTOS = [
            { id: 'p1', visible: true, categoria: 'ALITAS', nombre: "Papi-Alita Completa", precio: 2.25, descuento: 11.56, descripcion: "Alita + Papas + Salsas (BBQ y Miel Mostaza) + Cola de 300ml GRATIS", imagen: "https://i.postimg.cc/y8pkYZz5/alitas-2-presas.jpg" },
            { id: 'p2', visible: true, categoria: 'ALITAS', nombre: "Combo 6 Alitas", precio: 4.10, descuento:11.52, descripcion: "6 Alitas + Papas + Salsas (BBQ y Miel Mostaza) + Cola de 300ml GRATIS", imagen: "https://i.postimg.cc/wTGp1c7h/6-alitas.jpg" },
            { id: 'p3', visible: true, categoria: 'ALITAS', nombre: "Combo 10 Alitas", precio: 7.99, descuento: 0, descripcion: "10 Alitas + Papas Fritas + Salsas (BBQ y Miel Mostaza) + Cola Personal 300ml GRATIS", imagen: "https://i.postimg.cc/hj3PrF2z/10-alita-nue.jpg" },
            { id: 'p4', visible: true, categoria: 'PROMOCIONES (Sujeto a disponibilidad de Stock)', nombre: "Monkey King Gloton", precio: 9.99, descuento: 20, descripcion: "20 Alitas + Papas Fritas + Salsas (BBQ y Miel Mostaza) + Cola Personal 300ml GRATIS", imagen: "https://i.postimg.cc/J07LkpNb/20ALITAS.jpg" },
            { id: 'p5', visible: true, categoria: 'BEBIDAS', nombre: "PEPSI PERSONAL 300ml", precio: 0.50, descuento: 0, descripcion: "Cola Negra Personal 300ml", imagen: "https://i.postimg.cc/W42znwwM/cola-n-pe.jpg" },
            { id: 'p6', visible: true, categoria: 'BEBIDAS', nombre: "COLA PEPSI 1L", precio: 0.75, descuento: 0, descripcion: "Cola Negra 1L", imagen: "https://i.postimg.cc/G2h7PVf4/pepsi-1L.jpg" },
            { id: 'p7', visible: true, categoria: 'BEBIDAS', nombre: "COLA 7UP 300ML", precio: 0.50, descuento: 0, descripcion: "Cola Transparente de 300ml", imagen: "https://i.postimg.cc/vTdZ47Tf/300-transpa.jpg" },
            { id: 'p8', visible: true, categoria: 'BEBIDAS', nombre: "COLA 7UP 1L", precio: 0.75, descuento: 0, descripcion: "Cola Transparente 1L", imagen: "https://i.postimg.cc/T1CvTnDX/7up-l.jpg" },
            { id: 'p9', visible: true, categoria: 'COMPLEMENTOS', nombre: "EXTRA MIEL MOSTAZA", precio: 0.50, descuento: 0, descripcion: "Salsa Miel Mostaza Receta de la Casa", imagen: "https://i.postimg.cc/Y0g837pB/miel-mos.jpg" },
            { id: 'p10', visible: true, categoria: 'COMPLEMENTOS', nombre: "EXTRA BBQ", precio: 0.50, descuento: 0, descripcion: "Salsa Artesanal con un Toque de Ahumado", imagen: "https://i.postimg.cc/xdJmHRfN/bbq-ahu.jpg" },
            { id: 'p11', visible: true, categoria: 'COMPLEMENTOS', nombre: "PORCION DE PAPAS MONKEY GRANDE", precio: 1.23, descuento: 0, descripcion: "Porcion Grande de Papas", imagen: "https://i.postimg.cc/Vv6mr7wp/POR-PAPA.jpg" },
            { id: 'p12', visible: true, categoria: 'ALITAS', nombre: "Monkey King Gloton", precio: 9.99, descuento: 0, descripcion: "20 Alitas + Papas Fritas + Salsas (BBQ y Miel Mostaza) + Cola Personal 300ml", imagen: "https://i.postimg.cc/J07LkpNb/20ALITAS.jpg" },
            { id: 'p13', visible: true, categoria: 'BEBIDAS', nombre: "FUZE TEA PERSONAL 300ml", precio: 0.60, descuento: 0, descripcion: "El toque Natural para tu Comida", imagen: "https://i.postimg.cc/BZKXgbGZ/fuxe.jpg" },
            { id: 'p14', visible: true, categoria: 'ALITAS', nombre: "Mega Familiar", precio: 15.99, descuento: 6.25, descripcion: "30 Alitas + Papa Familiar + Salsas (BBQ y Miel Mostaza) + Cola de 1L GRATIS", imagen: "https://i.postimg.cc/J07LkpNb/20ALITAS.jpg" }
        ];

        function precioFinal(p) {
            if (!p.descuento || p.descuento <= 0) return p.precio;
            return parseFloat((p.precio * (1 - p.descuento / 100)).toFixed(2));
        }

        const ZONAS_ENVIO = {"type":"FeatureCollection","features":[{"type":"Feature","properties":{"Precio":0.60,"nombre":"Zona 1"},"geometry":{"type":"Polygon","coordinates":[[[-78.495306,-0.258094],[-78.497350,-0.257534],[-78.499792,-0.260332],[-78.501717,-0.264135],[-78.503005,-0.265210],[-78.503057,-0.273833],[-78.499363,-0.274835],[-78.496614,-0.267495],[-78.495306,-0.258094]]]}},{"type":"Feature","properties":{"Precio":0.80,"nombre":"Zona 2"},"geometry":{"type":"Polygon","coordinates":[[[-78.498454,-0.272664],[-78.499247,-0.274984],[-78.503061,-0.273934],[-78.503349,-0.276611],[-78.500844,-0.280324],[-78.496744,-0.276669],[-78.495759,-0.274271],[-78.498454,-0.272664]]]}},{"type":"Feature","properties":{"Precio":0.82,"nombre":"Zona 3"},"geometry":{"type":"Polygon","coordinates":[[[-78.496450,-0.256412],[-78.497143,-0.257529],[-78.495195,-0.258083],[-78.495804,-0.262126],[-78.494503,-0.263317],[-78.493035,-0.261665],[-78.494539,-0.258867],[-78.493413,-0.257224],[-78.495066,-0.256403],[-78.496450,-0.256412]]]}},{"type":"Feature","properties":{"Precio":0.90,"nombre":"Zona 4"},"geometry":{"type":"Polygon","coordinates":[[[-78.485325,-0.258668],[-78.484086,-0.254595],[-78.490144,-0.257959],[-78.493192,-0.257137],[-78.494356,-0.258895],[-78.485325,-0.258668]]]}},{"type":"Feature","properties":{"Precio":2.00,"nombre":"Zona 5"},"geometry":{"type":"Polygon","coordinates":[[[-78.483858,-0.253950],[-78.482783,-0.251496],[-78.483365,-0.249384],[-78.486489,-0.248676],[-78.487943,-0.252293],[-78.483858,-0.253950]]]}},{"type":"Feature","properties":{"Precio":1.40,"nombre":"Zona 6"},"geometry":{"type":"Polygon","coordinates":[[[-78.494899,-0.256401],[-78.490134,-0.257822],[-78.484121,-0.254582],[-78.483861,-0.254044],[-78.488054,-0.252260],[-78.486911,-0.249348],[-78.490203,-0.248915],[-78.494397,-0.250388],[-78.494899,-0.256401]]]}},{"type":"Feature","properties":{"Precio":1.36,"nombre":"Zona 7"},"geometry":{"type":"Polygon","coordinates":[[[-78.494965,-0.256274],[-78.494495,-0.250310],[-78.491566,-0.248921],[-78.496632,-0.245244],[-78.498898,-0.252726],[-78.496611,-0.256360],[-78.494965,-0.256274]]]}},{"type":"Feature","properties":{"Precio":1.92,"nombre":"Zona 8"},"geometry":{"type":"Polygon","coordinates":[[[-78.500202,-0.247945],[-78.497726,-0.248679],[-78.496658,-0.245132],[-78.492557,-0.248033],[-78.489923,-0.243984],[-78.490905,-0.241735],[-78.493849,-0.240058],[-78.498988,-0.241325],[-78.500202,-0.247945]]]}},{"type":"Feature","properties":{"Precio":2.00,"nombre":"Zona 9"},"geometry":{"type":"Polygon","coordinates":[[[-78.492480,-0.248089],[-78.491491,-0.248867],[-78.490239,-0.248801],[-78.486850,-0.249236],[-78.486521,-0.248577],[-78.483356,-0.249315],[-78.485176,-0.245597],[-78.485637,-0.242262],[-78.485097,-0.239150],[-78.489540,-0.237621],[-78.493706,-0.240007],[-78.490885,-0.241576],[-78.489856,-0.243989],[-78.492480,-0.248089]]]}},{"type":"Feature","properties":{"Precio":1.84,"nombre":"Zona 10"},"geometry":{"type":"Polygon","coordinates":[[[-78.494240,-0.259052],[-78.492862,-0.261718],[-78.494388,-0.263501],[-78.495786,-0.262393],[-78.496348,-0.266586],[-78.494436,-0.268514],[-78.490066,-0.270843],[-78.487769,-0.269751],[-78.486821,-0.267839],[-78.487463,-0.264337],[-78.484009,-0.265750],[-78.479896,-0.266329],[-78.481383,-0.261362],[-78.484539,-0.262846],[-78.491048,-0.259118],[-78.494240,-0.259052]]]}},{"type":"Feature","properties":{"Precio":1.97,"nombre":"Zona 11"},"geometry":{"type":"Polygon","coordinates":[[[-78.490571,-0.284894],[-78.488755,-0.282331],[-78.492173,-0.279576],[-78.496722,-0.276735],[-78.500759,-0.280366],[-78.503472,-0.288205],[-78.490571,-0.284894]]]}},{"type":"Feature","properties":{"Precio":1.91,"nombre":"Zona 12"},"geometry":{"type":"Polygon","coordinates":[[[-78.498311,-0.272594],[-78.495536,-0.274184],[-78.496490,-0.276642],[-78.488656,-0.282250],[-78.489870,-0.276815],[-78.489638,-0.271091],[-78.493628,-0.269357],[-78.496259,-0.267015],[-78.498311,-0.272594]]]}}]};

        let carrito = {};
        let metodo = 'domicilio';
        let envioCosto = 0;
        let zonaEncontrada = false;
        let map = null, userMarker = null;
        let metodoPago = '';

        // ============================================================
        // CAMBIO 1: Opciones de pago segun metodo
        // domicilio  => solo Transferencia
        // retiro     => Efectivo + Transferencia
        // ============================================================
        function renderizarPagoCarrito() {
            const cont = document.getElementById('opciones-pago-carrito');
            if (!cont) return;
            cont.innerHTML = '';

            const opciones = metodo === 'retiro'
                ? [{ key: 'efectivo', label: 'Efectivo' }, { key: 'transferencia', label: 'Transferencia' }]
                : [{ key: 'transferencia', label: 'Transferencia' }];

            // Si la opcion actual no esta disponible, resetear a la primera
            if (!opciones.find(o => o.key === metodoPago)) {
                metodoPago = opciones[0].key;
            }

            opciones.forEach(op => {
                const sel = metodoPago === op.key ? 'selected' : '';
                cont.innerHTML += `
                    <button class="pago-btn ${sel}" onclick="seleccionarPago('${op.key}')">
                        ${op.key === 'efectivo' ? '&#128181; ' : '&#128196; '}${op.label}
                    </button>`;
            });
        }

        function seleccionarPago(key) {
            metodoPago = key;
            renderizarPagoCarrito();
            renderizarPanelCarrito();
        }

        // ============================================================
        // Render menu
        // ============================================================
        function renderizarMenu() {
            const container = document.getElementById('contenedor-menu');
            container.innerHTML = '';

            const productosVisibles = PRODUCTOS.filter(p => p.visible !== false);
            const categorias = [...new Set(productosVisibles.map(p => p.categoria))];

            categorias.forEach(cat => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden mb-6">
                        <div class="bg-gradient-to-r from-orange-50 to-orange-100 px-4 py-3 border-b border-orange-200">
                            <h2 class="font-black text-orange-800 text-lg uppercase">${cat}</h2>
                        </div>
                        <div id="cat-${cat}" class="divide-y divide-gray-100"></div>
                    </div>`;

                const catContainer = document.getElementById(`cat-${cat}`);
                productosVisibles.filter(p => p.categoria === cat).forEach(p => {
                    const cantidad = carrito[p.id] || 0;
                    const pFinal = precioFinal(p);
                    const tieneDescuento = p.descuento && p.descuento > 0;

                    const precioHTML = tieneDescuento
                        ? `<div class="flex items-center gap-2 flex-wrap mt-1">
                                <span class="precio-original">$${p.precio.toFixed(2)}</span>
                                <span class="precio-final">$${pFinal.toFixed(2)}</span>
                                <span class="badge-descuento">-${p.descuento}%</span>
                           </div>`
                        : `<p class="text-orange-600 font-bold mt-1">$${pFinal.toFixed(2)}</p>`;

                    const imagenHTML = p.imagen
                        ? `<div class="imagen-contenedor"><img src="${p.imagen}" class="imagen-plato" alt="${p.nombre}"></div>`
                        : `<div class="imagen-contenedor"><div class="imagen-placeholder">&#127829;</div></div>`;

                    /*
                     * CAMBIO 2: controles en columna (flex-col) para que el
                     * numero de unidades quede DEBAJO del boton "+" y no
                     * se superponga al precio ni al costo de envio.
                     */
                    const controlesHTML = `
                        <div class="controles-producto">
                            <button onclick="agregarAlCarrito('${p.id}')"
                                class="btn-control bg-orange-500 text-white shadow-md">&#43;</button>
                            ${cantidad > 0 ? `<span class="cantidad-badge">${cantidad}</span>` : ''}
                            ${cantidad > 0
                                ? `<button onclick="quitarDelCarrito('${p.id}')"
                                    class="btn-control bg-white text-red-500 shadow-sm border border-gray-200">&#8722;</button>`
                                : ''}
                        </div>`;

                    catContainer.innerHTML += `
                        <div class="producto-card p-4 flex items-center gap-3">
                            ${imagenHTML}
                            <div class="flex-1 min-w-0">
                                <h3 class="font-black text-xs uppercase text-gray-700 leading-tight">${p.nombre}</h3>
                                <p class="text-[10px] text-gray-500 leading-tight my-1">${p.descripcion}</p>
                                ${precioHTML}
                            </div>
                            ${controlesHTML}
                        </div>`;
                });
            });
        }

        function agregarAlCarrito(id) {
            carrito[id] = (carrito[id] || 0) + 1;
            renderizarMenu();
            actualizarBarraCarrito();
        }

        function quitarDelCarrito(id) {
            if (carrito[id] > 0) { carrito[id]--; if (carrito[id] === 0) delete carrito[id]; }
            renderizarMenu();
            actualizarBarraCarrito();
            renderizarPanelCarrito();
        }

        // ============================================================
        // Barra inferior
        // ============================================================
        function actualizarBarraCarrito() {
            const totalItems = Object.values(carrito).reduce((a, b) => a + b, 0);
            const bar = document.getElementById('carrito-bar');

            if (totalItems === 0) { bar.classList.add('hidden'); return; }

            let subtotal = 0;
            PRODUCTOS.forEach(p => { if (carrito[p.id]) subtotal += precioFinal(p) * carrito[p.id]; });

            const entregaBloqueada = metodo === 'domicilio' && !zonaEncontrada;

            if (entregaBloqueada) {
                document.getElementById('total-precio').innerText = "Ubicacion necesaria";
                document.getElementById('label-envio').innerText = "Fuera de rango";
            } else {
                const total = metodo === 'domicilio' ? subtotal + envioCosto : subtotal;
                document.getElementById('total-precio').innerText = `$${total.toFixed(2)}`;
                document.getElementById('label-envio').innerText = metodo === 'domicilio' ? `Envio: $${envioCosto.toFixed(2)}` : "Retiro en local";
            }

            document.getElementById('carrito-count').innerText = totalItems;
            bar.classList.remove('hidden');
        }

        // ============================================================
        // Panel carrito
        // ============================================================
        function abrirCarrito() {
            renderizarPanelCarrito();
            renderizarPagoCarrito();
            document.getElementById('panel-carrito').classList.add('abierto');
            document.getElementById('carrito-overlay').classList.add('visible');
        }

        function cerrarCarrito() {
            document.getElementById('panel-carrito').classList.remove('abierto');
            document.getElementById('carrito-overlay').classList.remove('visible');
        }

        function renderizarPanelCarrito() {
            const lista = document.getElementById('lista-carrito');
            const resumen = document.getElementById('resumen-carrito');
            lista.innerHTML = '';
            resumen.innerHTML = '';

            const itemsEnCarrito = PRODUCTOS.filter(p => carrito[p.id] && carrito[p.id] > 0);
            if (itemsEnCarrito.length === 0) {
                lista.innerHTML = '<p class="text-center text-gray-400 py-6 text-sm">Tu carrito esta vacio</p>';
                document.getElementById('seccion-pago-carrito').classList.add('hidden');
                return;
            }

            document.getElementById('seccion-pago-carrito').classList.remove('hidden');
            renderizarPagoCarrito();

            let subtotal = 0;
            let ahorroTotal = 0;

            itemsEnCarrito.forEach(p => {
                const cant = carrito[p.id];
                const pFinal = precioFinal(p);
                const subtotalItem = pFinal * cant;
                const tieneDescuento = p.descuento && p.descuento > 0;
                const ahorro = tieneDescuento ? (p.precio - pFinal) * cant : 0;
                subtotal += subtotalItem;
                ahorroTotal += ahorro;

                const imagenHTML = p.imagen
                    ? `<img src="${p.imagen}" class="w-12 h-12 object-cover rounded-xl flex-shrink-0" alt="${p.nombre}">`
                    : `<div class="w-12 h-12 bg-orange-100 rounded-xl flex-shrink-0 flex items-center justify-center text-lg">&#127829;</div>`;

                lista.innerHTML += `
                    <div class="flex items-center gap-3 bg-gray-50 rounded-2xl p-3">
                        ${imagenHTML}
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-xs text-gray-800 uppercase leading-tight truncate">${p.nombre}</p>
                            ${tieneDescuento
                                ? `<div class="flex items-center gap-1 mt-0.5">
                                        <span class="text-[10px] text-gray-400 line-through">$${p.precio.toFixed(2)}</span>
                                        <span class="text-xs font-black text-orange-600">$${pFinal.toFixed(2)}</span>
                                        <span class="badge-descuento">-${p.descuento}%</span>
                                   </div>`
                                : `<p class="text-xs font-bold text-orange-600 mt-0.5">$${pFinal.toFixed(2)}</p>`
                            }
                        </div>
                        <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl p-1">
                            <button onclick="quitarDelCarrito('${p.id}');"
                                class="w-7 h-7 flex items-center justify-center rounded-lg bg-red-50 text-red-500 font-bold text-base leading-none">&#8722;</button>
                            <span class="font-black text-sm w-5 text-center">${cant}</span>
                            <button onclick="agregarAlCarrito('${p.id}'); renderizarPanelCarrito();"
                                class="w-7 h-7 flex items-center justify-center rounded-lg bg-orange-500 text-white font-bold text-base leading-none">&#43;</button>
                        </div>
                        <div class="text-right flex-shrink-0 min-w-[48px]">
                            <p class="font-black text-sm text-gray-800">$${subtotalItem.toFixed(2)}</p>
                            <p class="text-[10px] text-gray-400">${cant} ud.</p>
                        </div>
                    </div>`;
            });

            const envioTexto = metodo === 'domicilio'
                ? (zonaEncontrada ? `$${envioCosto.toFixed(2)}` : 'Sin ubicacion')
                : 'Retiro';
            const total = metodo === 'domicilio' && zonaEncontrada ? subtotal + envioCosto : subtotal;
            const pagoLabel = metodoPago === 'efectivo' ? 'Efectivo' : 'Transferencia';

            resumen.innerHTML = `
                <div class="mt-2 bg-orange-50 rounded-2xl p-4 border border-orange-100 space-y-2">
                    <div class="flex justify-between text-sm text-gray-600">
                        <span>Subtotal productos</span>
                        <span class="font-bold">$${subtotal.toFixed(2)}</span>
                    </div>
                    ${ahorroTotal > 0 ? `
                    <div class="flex justify-between text-sm text-green-600">
                        <span>Ahorro con descuentos</span>
                        <span class="font-bold">-$${ahorroTotal.toFixed(2)}</span>
                    </div>` : ''}
                    <div class="flex justify-between text-sm text-gray-600">
                        <span>${metodo === 'domicilio' ? 'Costo de envio' : 'Metodo'}</span>
                        <span class="font-bold">${envioTexto}</span>
                    </div>
                    <div class="flex justify-between text-sm text-gray-600">
                        <span>Pago</span>
                        <span class="font-bold">${pagoLabel}</span>
                    </div>
                    <div class="border-t border-orange-200 pt-2 flex justify-between">
                        <span class="font-black text-gray-800">TOTAL</span>
                        <span class="font-black text-xl text-orange-600">$${total.toFixed(2)}</span>
                    </div>
                </div>`;

            // Habilitar/deshabilitar boton PEDIR AHORA segun zona
            const btnWa = document.getElementById('btn-whatsapp');
            if (metodo === 'domicilio' && !zonaEncontrada) {
                btnWa.classList.add('btn-disabled');
                btnWa.disabled = true;
            } else {
                btnWa.classList.remove('btn-disabled');
                btnWa.disabled = false;
            }
        }

        // ============================================================
        // Mapa
        // ============================================================
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(LOCAL_COORDS, 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.marker(LOCAL_COORDS).addTo(map).bindPopup("<b>Danm Monkey</b>");
            map.on('click', (e) => ubicarManual(e.latlng));
        }

        function ubicarManual(latlng) {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(latlng, { draggable: true }).addTo(map);
            calcularPrecioEnvio(latlng);
        }

        function calcularPrecioEnvio(latlng) {
            const punto = turf.point([latlng.lng, latlng.lat]);
            zonaEncontrada = false; envioCosto = 0;
            for (let zona of ZONAS_ENVIO.features) {
                if (turf.booleanPointInPolygon(punto, zona)) {
                    envioCosto = zona.properties.Precio;
                    zonaEncontrada = true; break;
                }
            }
            const status = document.getElementById('envio-status');
            if (zonaEncontrada) {
                status.innerHTML = `Zona identificada - Envio: $${envioCosto.toFixed(2)}`;
                status.className = "p-2 bg-green-50 text-green-700 mt-2 text-xs rounded-lg font-semibold";
            } else {
                status.innerHTML = "LO SENTIMOS: Fuera de nuestra zona de cobertura";
                status.className = "p-2 bg-red-100 text-red-700 mt-2 text-xs rounded-lg font-bold";
            }
            actualizarBarraCarrito();
        }

        function obtenerUbicacion() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setView(latlng, 17); ubicarManual(latlng);
            }, () => alert("Por favor activa tu GPS"), { enableHighAccuracy: true });
        }

        function setMetodo(tipo) {
            metodo = tipo;
            document.getElementById('btn-domicilio').classList.toggle('active', tipo === 'domicilio');
            document.getElementById('btn-retiro').classList.toggle('active', tipo === 'retiro');
            document.getElementById('seccion-mapa').classList.toggle('hidden', tipo === 'retiro');
            document.getElementById('seccion-retiro').classList.toggle('hidden', tipo === 'domicilio');

            // Resetear pago segun nuevo metodo
            metodoPago = tipo === 'retiro' ? 'efectivo' : 'transferencia';

            renderizarPagoCarrito();
            actualizarBarraCarrito();
            if (tipo === 'domicilio') setTimeout(() => map.invalidateSize(), 200);
        }

        // ============================================================
        // WhatsApp
        // ============================================================
        function enviarWhatsApp() {
            if (metodo === 'domicilio' && !zonaEncontrada) return;

            let subtotal = 0;
            let ahorroTotal = 0;
            let texto = `*NUEVO PEDIDO - DAMN MONKEY*%0A%0A`;

            PRODUCTOS.forEach(p => {
                if (carrito[p.id]) {
                    const pFinal = precioFinal(p);
                    const subtotalItem = pFinal * carrito[p.id];
                    const tieneDescuento = p.descuento && p.descuento > 0;
                    const ahorro = tieneDescuento ? (p.precio - pFinal) * carrito[p.id] : 0;
                    texto += `- ${carrito[p.id]}x ${p.nombre}`;
                    if (tieneDescuento) texto += ` (-${p.descuento}%)`;
                    texto += ` = $${subtotalItem.toFixed(2)}%0A`;
                    subtotal += subtotalItem;
                    ahorroTotal += ahorro;
                }
            });

            texto += `%0A*--- RESUMEN ---*%0A`;
            texto += `*Subtotal:* $${subtotal.toFixed(2)}%0A`;
            if (ahorroTotal > 0) texto += `*Ahorro descuentos:* -$${ahorroTotal.toFixed(2)}%0A`;

            if (metodo === 'domicilio') {
                texto += `*Envio:* $${envioCosto.toFixed(2)}%0A`;
                texto += `*Metodo:* Domicilio%0A`;
                if (userMarker) {
                    const l = userMarker.getLatLng();
                    texto += `*Ubicacion:* https://www.google.com/maps?q=${l.lat},${l.lng}%0A`;
                }
            } else {
                texto += `*Metodo:* Retiro en local%0A`;
            }

            texto += `*Pago:* ${metodoPago === 'efectivo' ? 'Efectivo' : 'Transferencia'}%0A`;
            const totalFinal = metodo === 'domicilio' ? (subtotal + envioCosto) : subtotal;
            texto += `%0A*TOTAL A PAGAR: $${totalFinal.toFixed(2)}*`;

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${texto}`, '_blank');
        }

        window.onload = () => {
            // Domicilio por defecto => solo transferencia
            metodoPago = 'transferencia';
            renderizarMenu();
            initMap();
        };
    </script>
</body>
</html>
